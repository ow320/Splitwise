<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splitwise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#FAFAF7;
    --surface:#FFFFFF;
    --surface-alt:#F2F1EA;
    --text:#1A1A18;
    --text-soft:#6E6E66;
    --text-faint:#9D9D93;
    --accent:#1CC29F;
    --accent-strong:#0F9D80;
    --accent-soft:#E1F7F1;
    --negative:#E0563F;
    --negative-soft:#FCEAE5;
    --border:#EAE8E0;
    --radius-lg:16px;
    --radius-md:12px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }
  .layout{
    display:flex;
    min-height:100vh;
  }

  /* --- Sidebar (trip list) --- */
  .sidebar{
    width:240px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--border);
    padding:22px 16px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .sidebar-brand{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:800;
    font-size:19px;
    letter-spacing:-0.3px;
    padding:0 8px;
    color:var(--accent-strong);
  }
  .sidebar-trips{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:2px;
    overflow-y:auto;
  }
  .sidebar-trip{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    padding:9px 10px;
    border-radius:10px;
    cursor:pointer;
    font-size:13.5px;
    font-weight:600;
    color:var(--text-soft);
  }
  .sidebar-trip:hover{background:var(--surface-alt);}
  .sidebar-trip.active{background:var(--accent-soft);color:var(--accent-strong);}
  .sidebar-trip-inner{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }
  .sidebar-trip-name{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .sidebar-trip .icon-btn{
    font-size:13px;
    flex-shrink:0;
  }
  .sidebar-newtrip{
    display:flex;
    gap:6px;
    padding-top:12px;
    border-top:1px solid var(--border);
  }
  .sidebar-newtrip input{
    flex:1;
    min-width:0;
    padding:9px 10px;
    font-size:16px;
  }
  .sidebar-newtrip .icon-round{
    width:36px;
    height:36px;
    font-size:16px;
  }
  @media (max-width:760px){
    .layout{flex-direction:column;}
    .sidebar{
      width:100%;
      height:64px;
      flex-direction:row;
      align-items:center;
      border-right:none;
      border-bottom:1px solid var(--border);
      padding:0 14px;
      gap:10px;
    }
    .sidebar-brand{display:none;}
    .sidebar-trips{
      flex-direction:row;
      overflow-x:auto;
      overflow-y:visible;
      -webkit-overflow-scrolling:touch;
      flex:1;
      gap:6px;
      align-items:center;
    }
    .sidebar-trip{
      white-space:nowrap;
      flex-shrink:0;
      padding:10px 12px;
    }
    .sidebar-newtrip{
      border-top:none;
      padding-top:0;
      flex-shrink:0;
    }
    .sidebar-newtrip input{width:96px;}
  }

  .main{
    flex:1;
    display:flex;
    justify-content:center;
    min-width:0;
  }
  .app{
    width:100%;
    max-width:460px;
    min-height:100vh;
    padding-bottom:110px;
    position:relative;
  }
  @media (max-width:760px){
    .app{min-height:calc(100vh - 64px);}
  }

  .app{padding-top:22px;}
  .icon-round{
    width:36px;
    height:36px;
    border-radius:50%;
    background:var(--surface);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    font-size:16px;
    color:var(--text-soft);
  }
  .icon-round:hover{background:var(--surface-alt);}

  /* --- Avatars --- */
  .avatar{
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;
    flex-shrink:0;
    line-height:1;
  }
  .avatar-square{border-radius:11px;}
  .avatar-stack{display:flex;align-items:center;position:relative;}
  .avatar-stack .avatar{border:2.5px solid var(--surface);margin-left:-11px;}
  .avatar-stack .avatar:first-child{margin-left:0;}
  .avatar-more{
    width:34px;height:34px;border-radius:50%;
    background:var(--surface-alt);color:var(--text-soft);
    display:flex;align-items:center;justify-content:center;
    font-size:11.5px;font-weight:700;
    border:2.5px solid var(--surface);margin-left:-11px;
    flex-shrink:0;
  }

  /* --- Group header (signature element) --- */
  .group-header{
    margin:14px 20px 0;
    background:var(--surface);
    border-radius:var(--radius-lg);
    padding:20px 22px 18px;
    box-shadow:0 1px 2px rgba(18,22,28,0.04), 0 8px 24px rgba(18,22,28,0.05);
  }
  .group-header-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .group-title-block{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }
  .group-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:800;
    font-size:20px;
    letter-spacing:-0.3px;
    line-height:1.2;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .group-meta{
    font-size:12.5px;
    color:var(--text-soft);
    margin-top:2px;
  }
  .group-header .avatar-stack{margin-top:14px;}
  .balance-line{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;
    font-size:17px;
    margin-top:14px;
  }
  .balance-line.positive{color:var(--accent-strong);}
  .balance-line.negative{color:var(--negative);}
  .balance-line.zero{color:var(--text-faint);}
  .summary-extra{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .mini-pill{
    font-variant-numeric:tabular-nums;
    font-size:11.5px;
    font-weight:600;
    padding:4px 9px;
    border-radius:20px;
    background:var(--surface-alt);
    color:var(--text-soft);
  }
  .mini-pill.positive{background:var(--accent-soft);color:var(--accent-strong);}
  .mini-pill.negative{background:var(--negative-soft);color:var(--negative);}

  .header-actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid var(--border);
  }
  .header-buttons{
    display:flex;
    gap:8px;
  }
  .header-actions .btn-settle{
    flex:none;
    padding:9px 18px;
    white-space:nowrap;
  }
  .btn-danger{background:var(--negative);color:#fff;}
  @media (max-width:460px){
    .header-actions{flex-direction:column;align-items:stretch;}
    .header-buttons{width:100%;}
    .header-buttons .btn-settle{flex:1;padding:9px 8px;}
  }
  .identity-row{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .identity-row span{
    font-size:12px;
    color:var(--text-soft);
  }
  .identity-row .switch-link{
    font-size:12px;
    color:var(--accent);
    font-weight:600;
    text-decoration:none;
    cursor:pointer;
    background:none;
    border:none;
    padding:0;
  }

  /* --- Tabs --- */
  .tabs{
    display:flex;
    margin:18px 20px 6px;
    background:var(--surface-alt);
    border-radius:12px;
    padding:4px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:9px 4px;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:13px;
    font-weight:600;
    border-radius:9px;
    cursor:pointer;
    color:var(--text-soft);
    user-select:none;
    transition:background 0.15s, color 0.15s;
  }
  .tab.active{
    background:var(--surface);
    color:var(--text);
    box-shadow:0 1px 3px rgba(18,22,28,0.08);
  }

  .content{padding:14px 20px 0;}
  .section-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;
    font-size:14.5px;
    margin:18px 2px 8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:var(--text);
  }
  .section-title .tag{
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:600;
    color:var(--text-faint);
    text-transform:none;
    letter-spacing:0;
  }

  /* --- Cards / rows --- */
  .card{
    background:var(--surface);
    border-radius:var(--radius-md);
    border:1px solid var(--border);
    overflow:hidden;
  }
  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:13px 16px;
    border-bottom:1px solid var(--border);
    gap:10px;
  }
  .row:last-child{border-bottom:none;}
  .row-avatar{flex-shrink:0;}
  .row-main{min-width:0;flex:1;}
  .row-title{font-size:14.5px;font-weight:600;}
  .row-sub{
    font-size:12px;
    color:var(--text-soft);
    margin-top:2px;
  }
  .row-amount{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    font-size:14.5px;
    white-space:nowrap;
  }
  .row-amount-block{text-align:right;white-space:nowrap;flex-shrink:0;}
  .row-amount-total{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    font-size:14.5px;
    color:var(--text);
  }
  .row-stake{
    font-size:11.5px;
    font-weight:600;
    margin-top:2px;
    font-variant-numeric:tabular-nums;
  }
  .row-stake.positive{color:var(--accent-strong);}
  .row-stake.negative{color:var(--negative);}
  .row-stake.faint{color:var(--text-faint);font-weight:500;}
  .row-stake-lg{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    font-size:14.5px;
  }
  .row-stake-lg.positive{color:var(--accent-strong);}
  .row-stake-lg.negative{color:var(--negative);}
  .row-stake-lg.faint{color:var(--text-faint);font-weight:600;}
  .you-tag{color:var(--text-faint);font-weight:400;}
  .icon-btn{
    background:none;
    border:none;
    color:var(--text-faint);
    font-size:15px;
    cursor:pointer;
    line-height:1;
    min-width:32px;
    min-height:32px;
    border-radius:8px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }
  .icon-btn:hover{color:var(--negative);background:var(--negative-soft);}

  .empty{
    text-align:center;
    color:var(--text-faint);
    font-size:13px;
    padding:32px 16px;
    line-height:1.6;
  }

  /* --- FAB --- */
  .fab{
    position:fixed;
    bottom:24px;
    right:20px;
    width:56px;height:56px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    border:none;
    font-size:26px;
    font-weight:400;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(15,102,89,0.35);
    display:flex;align-items:center;justify-content:center;
  }
  .fab:active{transform:scale(0.95);}

  /* --- Modal --- */
  .overlay{
    position:fixed;inset:0;
    background:rgba(18,22,28,0.45);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:20;
  }
  .modal{
    background:var(--bg);
    width:100%;
    max-width:460px;
    border-radius:22px 22px 0 0;
    padding:20px 20px 26px;
    max-height:88vh;
    overflow-y:auto;
  }
  .modal.centered{border-radius:20px;max-width:400px;margin:0 20px;}
  .modal h3{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;
    font-size:18px;
    margin:2px 0 4px;
  }
  .modal-intro{
    font-size:13px;
    color:var(--text-soft);
    line-height:1.5;
    margin-bottom:4px;
  }
  label{
    display:block;
    font-size:11.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--text-soft);
    margin:16px 0 6px;
  }
  input[type=text], input[type=number], select{
    width:100%;
    padding:12px 13px;
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    background:var(--surface);
    font-family:'Inter',sans-serif;
    font-size:16px;
    color:var(--text);
  }
  input:focus, select:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .field-row{display:flex;gap:10px;}
  .field-row > div{flex:1;}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    padding:8px 13px;
    border-radius:20px;
    border:1px solid var(--border);
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    background:var(--surface);
    user-select:none;
    color:var(--text-soft);
  }
  .chip.selected{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--accent-strong);
    font-weight:600;
  }
  .segmented{
    display:flex;
    background:var(--surface-alt);
    border-radius:10px;
    padding:3px;
    gap:2px;
  }
  .segmented .seg{
    flex:1;
    text-align:center;
    padding:8px 4px;
    font-size:12.5px;
    font-weight:600;
    color:var(--text-soft);
    border-radius:8px;
    cursor:pointer;
  }
  .segmented .seg.active{
    background:var(--surface);
    color:var(--text);
    box-shadow:0 1px 3px rgba(18,22,28,0.1);
  }
  .split-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 2px;
    gap:10px;
  }
  .split-row .name{font-size:13.5px;font-weight:500;flex:1;}
  .split-row input{width:96px;padding:8px 10px;font-size:16px;text-align:right;}
  .split-total{
    display:flex;
    justify-content:space-between;
    font-variant-numeric:tabular-nums;
    font-weight:600;
    font-size:12px;
    color:var(--text-soft);
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed var(--border);
  }
  .split-total.ok{color:var(--accent-strong);}
  .split-total.off{color:var(--negative);}
  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  .btn{
    flex:1;
    padding:12px;
    border-radius:var(--radius-sm);
    border:none;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-secondary{background:var(--surface);color:var(--text-soft);border:1px solid var(--border);}

  .settle-row .arrow{color:var(--accent);margin:0 6px;font-weight:600;}
  .settle-row .avatar-pair{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .btn-record{
    flex-shrink:0;
    padding:7px 12px;
    border-radius:20px;
    border:1px solid var(--accent);
    background:var(--accent-soft);
    color:var(--accent-strong);
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-record:hover{background:var(--accent);color:#fff;}

  .loading-screen{
    display:flex;align-items:center;justify-content:center;
    height:70vh;
    font-family:'Plus Jakarta Sans',sans-serif;
    color:var(--text-faint);
    font-size:13px;
  }
</style>
</head>
<body>
<div class="layout" id="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="app" id="app">
      <div class="loading-screen">loading trip…</div>
    </div>
  </div>
</div>

<script>
const CURRENCIES = {
  CAD:{symbol:'$', label:'Canadian Dollar'},
  USD:{symbol:'$', label:'US Dollar'},
  EUR:{symbol:'€', label:'Euro'},
  GBP:{symbol:'£', label:'British Pound'},
  JPY:{symbol:'¥', label:'Japanese Yen'},
  AUD:{symbol:'$', label:'Australian Dollar'},
  CHF:{symbol:'Fr', label:'Swiss Franc'},
  INR:{symbol:'₹', label:'Indian Rupee'}
};

// ---- Firebase config ----
// Replace these placeholder values with the config from your own Firebase
// project (Project settings > General > Your apps > SDK setup and
// configuration). See README.md for the full walkthrough.
const firebaseConfig = {
  apiKey: "AIzaSyB-aVUGMhhhvhss-_mDVFzdBOY_HDsqvT8",
  authDomain: "splitwise-6ff6e.firebaseapp.com",
  databaseURL: "https://splitwise-6ff6e-default-rtdb.firebaseio.com",
  projectId: "splitwise-6ff6e",
  storageBucket: "splitwise-6ff6e.firebasestorage.app",
  messagingSenderId: "326754638035",
  appId: "1:326754638035:web:4e83b2413a8110bd339c26",
  measurementId: "G-RHNRK5JYD2"
};
// Every trip/group is its own document in this Firestore collection.
const TRIPS_COLLECTION = 'trips';
const LEGACY_TRIP_ID = 'vancouver-trip-2026';

let db = null;
let trips = [];           // [{id, name}] — every trip this device knows about
let activeTripId = null;
let unsubscribe = null;
let data = { name: '', friends: [], expenses: [], settings: { defaultCurrency: 'CAD' } };
let identity = null;      // {name} — global per device; id is resolved per trip
let activeTab = 'expenses';
let loaded = false;

function setupNeeded(){
  return firebaseConfig.apiKey === 'YOUR_API_KEY';
}
function escapeHtml(s){
  return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const AVATAR_COLORS = ['#1CC29F','#E0563F','#3B82C4','#F4A73C','#8B5CF6','#EC6EAD','#4C9F70','#0F9D80'];
function avatarColor(name){
  let hash = 0;
  for(let i=0;i<(name||'').length;i++){ hash = name.charCodeAt(i) + ((hash<<5)-hash); }
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}
function initials(name){
  return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
}
function avatarHtml(name, size, square){
  size = size || 32;
  return `<div class="avatar${square?' avatar-square':''}" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.38)}px;background:${avatarColor(name)}">${escapeHtml(initials(name))}</div>`;
}
function avatarStackHtml(friends, max){
  max = max || 6;
  const shown = friends.slice(0, max);
  let html = '<div class="avatar-stack">' + shown.map(f => avatarHtml(f.name, 34)).join('');
  if(friends.length > max) html += `<div class="avatar-more">+${friends.length - max}</div>`;
  return html + '</div>';
}

function loadIdentityLocal(){
  try{
    const raw = localStorage.getItem('tally-identity');
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveIdentityLocal(){
  try{ localStorage.setItem('tally-identity', JSON.stringify({name: identity.name})); }
  catch(e){ console.error('Save identity failed', e); }
}

function showFatal(title, body){
  document.getElementById('app').innerHTML = `
    <div style="padding:40px 24px;font-family:'Inter',sans-serif;line-height:1.6;color:#12161C;">
      <h2 style="font-family:'Plus Jakarta Sans',sans-serif;">${title}</h2>
      <p>${body}</p>
    </div>`;
}

async function loadData(){
  if(setupNeeded()){
    showFatal('Setup needed', "This page needs a Firebase project connected before it'll work. Open <code>index.html</code>, fill in the <code>firebaseConfig</code> object near the top of the script with your own project's values, and redeploy. Full steps are in <code>README.md</code>.");
    return;
  }
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();

  try{
    await refreshTripsList();
    if(trips.length === 0){
      // First-ever run: create a starter trip, reusing the old fixed id
      // so anyone who deployed this before groups existed keeps their data.
      await createTrip('Vancouver Trip 2026', LEGACY_TRIP_ID);
    }
  }catch(e){
    console.error('Load failed', e);
    showFatal("Couldn't connect", 'Double-check your Firebase config and Firestore security rules (see README.md).');
    return;
  }

  identity = loadIdentityLocal();

  let startId = localStorage.getItem('tally-active-trip');
  if(!startId || !trips.some(t => t.id === startId)) startId = trips[0].id;
  await openTrip(startId);
}

async function refreshTripsList(){
  const snap = await db.collection(TRIPS_COLLECTION).get();
  trips = snap.docs.map(d => ({id: d.id, name: (d.data().name) || 'Untitled trip'}));
  renderSidebar();
}

async function createTrip(name, idOverride){
  const id = idOverride || ('t' + Date.now());
  const trip = { name, friends: [], expenses: [], settings: { defaultCurrency: 'CAD' } };
  await db.collection(TRIPS_COLLECTION).doc(id).set(trip);
  trips.push({id, name});
  renderSidebar();
  return id;
}

async function deleteTrip(id){
  await db.collection(TRIPS_COLLECTION).doc(id).delete();
  trips = trips.filter(t => t.id !== id);
  if(trips.length === 0){
    await createTrip('New trip');
  }
  if(id === activeTripId){
    await openTrip(trips[0].id);
  } else {
    renderSidebar();
  }
}

/* ---------- Sidebar (trip list) ---------- */
function renderSidebar(){
  const sidebar = document.getElementById('sidebar');
  if(!sidebar) return;
  const tripRows = trips.map(t => `
    <div class="sidebar-trip ${t.id===activeTripId ? 'active' : ''}" data-open="${t.id}">
      <span class="sidebar-trip-inner">${avatarHtml(t.name, 24, true)}<span class="sidebar-trip-name">${escapeHtml(t.name)}</span></span>
      <button class="icon-btn" data-delete="${t.id}" title="Delete trip">✕</button>
    </div>`).join('');
  sidebar.innerHTML = `
    <div class="sidebar-brand">Splitwise</div>
    <div class="sidebar-trips">${tripRows}</div>
    <div class="sidebar-newtrip">
      <input type="text" id="newTripInput" placeholder="New trip name">
      <button class="icon-round" id="addTripBtn" title="Create trip">+</button>
    </div>
  `;
  sidebar.querySelectorAll('[data-open]').forEach(el => {
    el.onclick = async () => { await openTrip(el.dataset.open); };
  });
  sidebar.querySelectorAll('[data-delete]').forEach(el => {
    el.onclick = async (e) => {
      e.stopPropagation();
      const msg = trips.length > 1
        ? 'Delete this trip and all its expenses? This cannot be undone.'
        : "This is your only trip. Deleting it replaces it with a fresh empty trip — all its expenses are lost. Continue?";
      if(!confirm(msg)) return;
      await deleteTrip(el.dataset.delete);
    };
  });
  const input = sidebar.querySelector('#newTripInput');
  async function submitNewTrip(){
    const name = input.value.trim();
    if(!name) return;
    const id = await createTrip(name);
    await openTrip(id);
  }
  sidebar.querySelector('#addTripBtn').onclick = submitNewTrip;
  input.onkeydown = (e) => { if(e.key === 'Enter') submitNewTrip(); };
}

function resolveIdentityForTrip(){
  if(!identity || !identity.name) return;
  let match = data.friends.find(f => f.name.toLowerCase() === identity.name.toLowerCase());
  if(!match){
    match = {id: 'f' + Date.now(), name: identity.name};
    data.friends.push(match);
    saveData();
  }
  identity.id = match.id;
}

async function openTrip(id){
  if(unsubscribe){ unsubscribe(); unsubscribe = null; }
  activeTripId = id;
  try{ localStorage.setItem('tally-active-trip', id); }catch(e){}

  const snap = await db.collection(TRIPS_COLLECTION).doc(id).get();
  data = snap.exists ? snap.data() : { name: 'Trip', friends: [], expenses: [] };
  if(!data.name) data.name = 'Vancouver Trip 2026';
  if(!data.settings) data.settings = { defaultCurrency: 'CAD' };
  if(!data.friends) data.friends = [];
  if(!data.expenses) data.expenses = [];

  resolveIdentityForTrip();
  loaded = true;
  renderSidebar();
  render();
  if(!identity || !identity.name) openLogin(true);

  unsubscribe = db.collection(TRIPS_COLLECTION).doc(id).onSnapshot(liveSnap => {
    if(document.querySelector('.overlay')) return;
    if(liveSnap.exists){
      data = liveSnap.data();
      if(!data.settings) data.settings = { defaultCurrency: 'CAD' };
      if(!data.friends) data.friends = [];
      if(!data.expenses) data.expenses = [];
      resolveIdentityForTrip();
      render();
    }
  });
}

async function saveData(){
  try{ await db.collection(TRIPS_COLLECTION).doc(activeTripId).set(data); }
  catch(e){
    console.error('Save failed', e);
    alert("Couldn't save — check your connection and try again.");
  }
}

function fmt(n, currency){
  const code = currency || data.settings.defaultCurrency;
  try{
    return new Intl.NumberFormat('en-US', {style:'currency', currency: code, currencyDisplay:'narrowSymbol'}).format(Math.abs(n));
  }catch(e){
    const sym = (CURRENCIES[code] && CURRENCIES[code].symbol) || code + ' ';
    return sym + Math.abs(n).toFixed(2);
  }
}
function friendName(id){
  const f = data.friends.find(f => f.id === id);
  return f ? f.name : 'Unknown';
}
function currenciesUsed(){
  const set = new Set([data.settings.defaultCurrency]);
  data.expenses.forEach(e => set.add(e.currency));
  return Array.from(set);
}
function computeBalances(currency){
  const net = {};
  data.friends.forEach(f => net[f.id] = 0);
  data.expenses.filter(e => e.currency === currency).forEach(exp => {
    net[exp.paidBy] = (net[exp.paidBy] || 0) + exp.amount;
    exp.shares.forEach(s => { net[s.id] = (net[s.id] || 0) - s.amount; });
  });
  return net;
}
function simplifyDebts(net){
  const debtors = [], creditors = [];
  Object.entries(net).forEach(([id, amt]) => {
    if(amt < -0.005) debtors.push({id, amt: -amt});
    else if(amt > 0.005) creditors.push({id, amt});
  });
  debtors.sort((a,b)=>b.amt-a.amt);
  creditors.sort((a,b)=>b.amt-a.amt);
  const settlements = [];
  let i=0, j=0;
  while(i < debtors.length && j < creditors.length){
    const pay = Math.min(debtors[i].amt, creditors[j].amt);
    settlements.push({from: debtors[i].id, to: creditors[j].id, amount: pay});
    debtors[i].amt -= pay; creditors[j].amt -= pay;
    if(debtors[i].amt < 0.01) i++;
    if(creditors[j].amt < 0.01) j++;
  }
  return settlements;
}
function computeShares(type, total, participantIds, valuesMap){
  const n = participantIds.length;
  if(type === 'equal'){
    const base = Math.floor((total/n)*100)/100;
    let sum = 0; const shares = [];
    participantIds.forEach((pid, idx) => {
      if(idx < n-1){ shares.push({id: pid, amount: base}); sum += base; }
      else{ shares.push({id: pid, amount: +(total-sum).toFixed(2)}); }
    });
    return shares;
  }
  if(type === 'exact'){
    return participantIds.map(pid => ({id: pid, amount: +(parseFloat(valuesMap[pid])||0).toFixed(2)}));
  }
  if(type === 'percentage'){
    return participantIds.map(pid => ({id: pid, amount: +(total * (parseFloat(valuesMap[pid])||0) / 100).toFixed(2)}));
  }
  if(type === 'shares'){
    const totalShares = participantIds.reduce((s,pid) => s + (parseFloat(valuesMap[pid])||0), 0) || 1;
    return participantIds.map(pid => ({id: pid, amount: +(total * (parseFloat(valuesMap[pid])||0) / totalShares).toFixed(2)}));
  }
  return [];
}

function switchTab(tab){ activeTab = tab; render(); }

/* ---------- Login ---------- */
function openLogin(forced){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  const existingChips = data.friends.map(f =>
    `<div class="chip" data-id="${f.id}" data-name="${f.name.replace(/"/g,'&quot;')}">${f.name}</div>`
  ).join('');
  overlay.innerHTML = `
    <div class="modal centered">
      <h3>Who are you?</h3>
      <div class="modal-intro">${forced ? "Pick your name so entries can be tracked back to you." : "Switch to a different name on this device."}</div>
      ${existingChips ? `<label>Already on the trip</label><div class="chip-row">${existingChips}</div>` : ''}
      <label>${existingChips ? "Or add yourself" : "Your name"}</label>
      <input type="text" id="loginNameInput" placeholder="e.g. Priya" autofocus>
      <div class="modal-actions">
        ${forced ? '' : '<button class="btn btn-secondary" id="cancelBtn">Cancel</button>'}
        <button class="btn btn-primary" id="loginBtn">Continue</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  if(!forced){
    overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
    overlay.querySelector('#cancelBtn').onclick = () => overlay.remove();
  }
  overlay.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      identity = {name: chip.dataset.name};
      saveIdentityLocal(); resolveIdentityForTrip(); overlay.remove(); render();
    };
  });
  overlay.querySelector('#loginBtn').onclick = () => {
    const name = overlay.querySelector('#loginNameInput').value.trim();
    if(!name){ alert('Enter a name, or tap yourself in the list above.'); return; }
    identity = {name};
    saveIdentityLocal(); resolveIdentityForTrip(); overlay.remove(); render();
  };
}

/* ---------- Add expense ---------- */
let selectedSplit = [];
let splitType = 'equal';
let splitValues = {};

function openAddExpense(){
  selectedSplit = data.friends.map(f => f.id);
  splitType = 'equal';
  splitValues = {};
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Add an expense</h3>
      <label>What was it for</label>
      <input type="text" id="descInput" placeholder="e.g. Dinner at Nori">
      <div class="field-row">
        <div>
          <label>Amount</label>
          <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0">
        </div>
        <div>
          <label>Currency</label>
          <select id="currencySelect">
            ${Object.entries(CURRENCIES).map(([code,c]) => `<option value="${code}" ${code===data.settings.defaultCurrency?'selected':''}>${code} ${c.symbol}</option>`).join('')}
          </select>
        </div>
      </div>
      <label>Paid by</label>
      <select id="paidBySelect">
        ${data.friends.map(f => `<option value="${f.id}">${f.name}</option>`).join('')}
      </select>
      <label>Split among</label>
      <div class="chip-row" id="splitChips">
        ${data.friends.map(f => `<div class="chip selected" data-id="${f.id}">${f.name}</div>`).join('')}
      </div>
      <label>Split method</label>
      <div class="segmented" id="splitSegmented">
        <div class="seg active" data-type="equal">Equal</div>
        <div class="seg" data-type="exact">Exact</div>
        <div class="seg" data-type="percentage">%</div>
        <div class="seg" data-type="shares">Shares</div>
      </div>
      <div id="splitDetail"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
  overlay.querySelector('#cancelBtn').onclick = () => overlay.remove();

  const amountInput = overlay.querySelector('#amountInput');
  const detailEl = overlay.querySelector('#splitDetail');

  function currentTotal(){ return parseFloat(amountInput.value) || 0; }

  function renderDetail(){
    if(splitType === 'equal'){
      detailEl.innerHTML = '';
      return;
    }
    const total = currentTotal();
    let unit = splitType === 'percentage' ? '%' : (splitType === 'shares' ? '' : '');
    detailEl.innerHTML = selectedSplit.map(pid => {
      if(!(pid in splitValues)){
        if(splitType === 'exact') splitValues[pid] = selectedSplit.length ? (total/selectedSplit.length).toFixed(2) : '0';
        else if(splitType === 'percentage') splitValues[pid] = selectedSplit.length ? (100/selectedSplit.length).toFixed(1) : '0';
        else splitValues[pid] = '1';
      }
      return `<div class="split-row">
        <div class="name">${friendName(pid)}</div>
        <input type="number" step="0.01" class="split-value" data-id="${pid}" value="${splitValues[pid]}">
      </div>`;
    }).join('') + renderSplitTotal(total);

    detailEl.querySelectorAll('.split-value').forEach(inp => {
      inp.oninput = () => {
        splitValues[inp.dataset.id] = inp.value;
        const totalLine = detailEl.querySelector('.split-total');
        if(totalLine) totalLine.outerHTML = renderSplitTotal(currentTotal());
      };
    });
  }

  function renderSplitTotal(total){
    if(splitType === 'exact'){
      const sum = selectedSplit.reduce((s,pid) => s + (parseFloat(splitValues[pid])||0), 0);
      const diff = +(total - sum).toFixed(2);
      const ok = Math.abs(diff) < 0.02;
      return `<div class="split-total ${ok?'ok':'off'}">Allocated ${sum.toFixed(2)} of ${total.toFixed(2)}${ok?' ✓':` — ${diff>0?'remaining':'over by'} ${Math.abs(diff).toFixed(2)}`}</div>`;
    }
    if(splitType === 'percentage'){
      const sum = selectedSplit.reduce((s,pid) => s + (parseFloat(splitValues[pid])||0), 0);
      const ok = Math.abs(sum-100) < 0.5;
      return `<div class="split-total ${ok?'ok':'off'}">${sum.toFixed(1)}% of 100%${ok?' ✓':''}</div>`;
    }
    if(splitType === 'shares'){
      const sum = selectedSplit.reduce((s,pid) => s + (parseFloat(splitValues[pid])||0), 0);
      return `<div class="split-total ${sum>0?'ok':'off'}">${sum} total share${sum===1?'':'s'}</div>`;
    }
    return '';
  }

  overlay.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      const id = chip.dataset.id;
      if(selectedSplit.includes(id)){
        selectedSplit = selectedSplit.filter(x => x !== id);
        chip.classList.remove('selected');
        delete splitValues[id];
      } else {
        selectedSplit.push(id);
        chip.classList.add('selected');
      }
      renderDetail();
    };
  });

  overlay.querySelectorAll('.seg').forEach(seg => {
    seg.onclick = () => {
      overlay.querySelectorAll('.seg').forEach(s => s.classList.remove('active'));
      seg.classList.add('active');
      splitType = seg.dataset.type;
      splitValues = {};
      renderDetail();
    };
  });

  amountInput.oninput = () => { if(splitType !== 'equal') renderDetail(); };

  overlay.querySelector('#saveBtn').onclick = () => {
    const desc = overlay.querySelector('#descInput').value.trim();
    const amount = parseFloat(amountInput.value);
    const currency = overlay.querySelector('#currencySelect').value;
    const paidBy = overlay.querySelector('#paidBySelect').value;
    if(!desc || !amount || amount <= 0){ alert('Add a description and a valid amount.'); return; }
    if(selectedSplit.length === 0){ alert('Select at least one person to split with.'); return; }

    if(splitType === 'exact'){
      const sum = selectedSplit.reduce((s,pid) => s + (parseFloat(splitValues[pid])||0), 0);
      if(Math.abs(sum - amount) > 0.02){ alert(`The exact amounts add up to ${sum.toFixed(2)}, not ${amount.toFixed(2)}. Adjust before saving.`); return; }
    }
    if(splitType === 'percentage'){
      const sum = selectedSplit.reduce((s,pid) => s + (parseFloat(splitValues[pid])||0), 0);
      if(Math.abs(sum - 100) > 0.5){ alert(`Percentages add up to ${sum.toFixed(1)}%, not 100%. Adjust before saving.`); return; }
    }
    if(splitType === 'shares'){
      const sum = selectedSplit.reduce((s,pid) => s + (parseFloat(splitValues[pid])||0), 0);
      if(sum <= 0){ alert('Enter at least one share.'); return; }
    }

    const shares = computeShares(splitType, amount, selectedSplit, splitValues);
    data.expenses.unshift({
      id: 'e' + Date.now(),
      description: desc,
      amount: amount,
      currency: currency,
      paidBy: paidBy,
      splitType: splitType,
      shares: shares,
      enteredBy: identity ? identity.id : null,
      date: new Date().toISOString()
    });
    saveData(); overlay.remove(); render();
  };

  renderDetail();
}
function removeExpense(id){
  data.expenses = data.expenses.filter(e => e.id !== id);
  saveData(); render();
}

/* ---------- Settle up ---------- */
function confirmSettle(fromId, toId, amount, currency){
  const msg = `Record that ${friendName(fromId)} paid ${friendName(toId)} ${fmt(amount, currency)}?`;
  if(!confirm(msg)) return;
  recordPayment(fromId, toId, amount, currency);
}
function recordPayment(fromId, toId, amount, currency){
  data.expenses.unshift({
    id: 'p' + Date.now(),
    description: 'Payment',
    amount: amount,
    currency: currency,
    paidBy: fromId,
    splitType: 'payment',
    shares: [{id: toId, amount: amount}],
    enteredBy: identity ? identity.id : null,
    date: new Date().toISOString()
  });
  saveData(); render();
}
function viewerStake(e){
  if(!identity) return null;
  const share = e.shares.find(s => s.id === identity.id);
  const shareAmt = share ? share.amount : 0;
  const paidAmt = e.paidBy === identity.id ? e.amount : 0;
  return paidAmt - shareAmt;
}

/* ---------- Render ---------- */
function render(){
  const app = document.getElementById('app');
  if(!loaded){ app.innerHTML = `<div class="loading-screen">loading trip…</div>`; return; }

  const defaultCurrency = data.settings.defaultCurrency;
  const usedCurrencies = currenciesUsed();
  const yourBalances = usedCurrencies.map(c => ({code: c, net: identity ? (computeBalances(c)[identity.id] || 0) : 0}));
  const primary = yourBalances.find(b => b.code === defaultCurrency) || yourBalances[0] || {code: defaultCurrency, net: 0};
  const others = yourBalances.filter(b => b.code !== primary.code && Math.abs(b.net) > 0.005);

  const balClass = primary.net > 0.005 ? 'positive' : (primary.net < -0.005 ? 'negative' : 'zero');
  const balSentence = !identity ? 'Sign in to see your balance'
    : primary.net > 0.005 ? `You are owed ${fmt(primary.net, primary.code)} overall`
    : primary.net < -0.005 ? `You owe ${fmt(primary.net, primary.code)} overall`
    : "You're all settled up";

  let bodyHtml = '';

  if(activeTab === 'expenses'){
    if(data.expenses.length === 0){
      bodyHtml = `<div class="card"><div class="empty">No expenses yet.<br>Tap the + button to add the first one.</div></div>`;
    } else {
      bodyHtml = `<div class="card">` + data.expenses.map(e => {
        const isPayment = e.splitType === 'payment';
        const methodLabel = (!isPayment && e.splitType !== 'equal') ? ` · by ${e.splitType}` : '';
        const subLabel = isPayment
          ? `Payment${e.enteredBy ? ' · added by ' + friendName(e.enteredBy) : ''}`
          : `${friendName(e.paidBy)} paid · split ${e.shares.length} way${e.shares.length>1?'s':''}${methodLabel}${e.enteredBy ? ' · added by ' + friendName(e.enteredBy) : ''}`;
        const stake = viewerStake(e);
        let stakeHtml = '';
        if(stake !== null){
          stakeHtml = Math.abs(stake) < 0.005
            ? `<div class="row-stake faint">not involved</div>`
            : `<div class="row-stake ${stake>0?'positive':'negative'}">${stake>0?'you lent':'you owe'} ${fmt(Math.abs(stake), e.currency)}</div>`;
        }
        return `<div class="row">
          <div class="row-avatar">${avatarHtml(friendName(e.paidBy), 34)}</div>
          <div class="row-main">
            <div class="row-title">${escapeHtml(isPayment ? friendName(e.paidBy) + ' → ' + friendName(e.shares[0].id) : e.description)}</div>
            <div class="row-sub">${subLabel}</div>
          </div>
          <div class="row-amount-block">
            <div class="row-amount-total">${fmt(e.amount, e.currency)}</div>
            ${stakeHtml}
          </div>
          <button class="icon-btn" onclick="removeExpense('${e.id}')" title="Delete">✕</button>
        </div>`;
      }).join('') + `</div>`;
    }
  }

  if(activeTab === 'balances'){
    bodyHtml = usedCurrencies.map(currency => {
      const hasExpenses = data.expenses.some(e => e.currency === currency);
      if(currency !== defaultCurrency && !hasExpenses) return '';
      const net = computeBalances(currency);
      const settlements = simplifyDebts(net);
      const balanceRows = data.friends.map(f => {
        const n = net[f.id] || 0;
        const isYou = identity && f.id === identity.id;
        const cls = n > 0.005 ? 'positive' : (n < -0.005 ? 'negative' : 'faint');
        const label = n > 0.005 ? `gets back ${fmt(n, currency)}` : (n < -0.005 ? `owes ${fmt(n, currency)}` : 'settled up');
        return `<div class="row">
          <div class="row-avatar">${avatarHtml(f.name, 36)}</div>
          <div class="row-main"><div class="row-title">${escapeHtml(f.name)}${isYou ? ' <span class="you-tag">(you)</span>':''}</div></div>
          <div class="row-amount-block"><div class="row-stake-lg ${cls}">${label}</div></div>
        </div>`;
      }).join('');
      let settleHtml;
      if(settlements.length === 0){
        settleHtml = `<div class="card"><div class="empty">Everyone's square.</div></div>`;
      } else {
        settleHtml = `<div class="card">` + settlements.map(s => `
          <div class="row settle-row">
            <div class="avatar-pair">${avatarHtml(friendName(s.from), 28)}<span class="arrow">→</span>${avatarHtml(friendName(s.to), 28)}</div>
            <div class="row-main row-title">${escapeHtml(friendName(s.from))} → ${escapeHtml(friendName(s.to))}</div>
            <div class="row-amount">${fmt(s.amount, currency)}</div>
            <button class="btn-record" onclick="confirmSettle('${s.from}','${s.to}',${s.amount},'${currency}')">Record</button>
          </div>`).join('') + `</div>`;
      }
      return `
        <div class="section-title">Balances <span class="tag">${currency}</span></div>
        <div class="card">${balanceRows}</div>
        <div class="section-title">Settle up <span class="tag">${currency}</span></div>
        ${settleHtml}
      `;
    }).join('');
  }

  if(activeTab === 'friends'){
    const isYou = (id) => identity && id === identity.id;
    bodyHtml = `<div class="card">` + data.friends.map(f => `
      <div class="row">
        <div class="row-avatar">${avatarHtml(f.name, 36)}</div>
        <div class="row-main row-title">${escapeHtml(f.name)}${isYou(f.id) ? ' <span class="you-tag">(you)</span>':''}</div>
        ${!isYou(f.id) ? `<button class="icon-btn" onclick="removeFriend('${f.id}')" title="Remove">✕</button>` : ''}
      </div>
    `).join('') + `</div>`;
  }

  document.title = 'Splitwise' + (data.name ? ' · ' + data.name : '');
  app.innerHTML = `
    <div class="group-header">
      <div class="group-header-top">
        <div class="group-title-block">
          ${avatarHtml(data.name, 44, true)}
          <div>
            <div class="group-name">${escapeHtml(data.name)}</div>
            <div class="group-meta">${data.friends.length} ${data.friends.length===1?'person':'people'}</div>
          </div>
        </div>
        <div class="icon-round" onclick="openSettings()" title="Trip settings">⚙</div>
      </div>
      ${avatarStackHtml(data.friends)}
      <div class="balance-line ${balClass}">${balSentence}</div>
      ${others.length ? `<div class="summary-extra">${others.map(o => `<span class="mini-pill ${o.net>0?'positive':'negative'}">${o.net<0?'-':'+'}${fmt(o.net, o.code)} ${o.code}</span>`).join('')}</div>` : ''}
      <div class="header-actions">
        <div class="identity-row">
          <span>${identity ? 'Signed in as ' + escapeHtml(identity.name) : 'Not signed in'}</span>
          <button class="switch-link" onclick="openLogin(false)">switch</button>
        </div>
        <div class="header-buttons">
          <button class="btn btn-primary btn-settle" onclick="switchTab('balances')">Settle up</button>
          <button class="btn btn-danger btn-settle" onclick="openAddExpense()">Add an expense</button>
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${activeTab==='expenses'?'active':''}" onclick="switchTab('expenses')">Expenses</div>
      <div class="tab ${activeTab==='balances'?'active':''}" onclick="switchTab('balances')">Balances</div>
      <div class="tab ${activeTab==='friends'?'active':''}" onclick="switchTab('friends')">Friends</div>
    </div>

    <div class="content">${bodyHtml}</div>

    ${activeTab==='friends' ? `<button class="fab" onclick="openAddFriend()" title="Add someone">+</button>` : ''}
  `;
}

loadData();
</script>
</body>
</html>
